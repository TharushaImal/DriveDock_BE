<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users | DriveDock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">DriveDock Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="reservations.html">Reservations</a></li>
                <li class="nav-item"><a class="nav-link active" href="users.html">Users</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="parking-management.html">Parking</a></li>
                <li class="nav-item"><a class="nav-link" href="payment-management.html">Payments</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-management.html">Admins</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><span class="nav-link" id="adminName"></span></li>
                <li class="nav-item">
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>User Management</h2>
    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Registered On</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>
</div>

<script>
    // Display admin name
    const adminInfo = JSON.parse(localStorage.getItem('adminInfo') || '{}');
    if (adminInfo.fullName) {
        document.getElementById('adminName').textContent = `Welcome, ${adminInfo.fullName}`;
    }

    function loadUsers() {
        fetch('/DriveDock/api/admin/users')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(user => {
                    html += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name || 'N/A'}</td>
                        <td>${user.email}</td>
                        <td>${user.phone || 'N/A'}</td>
                        <td>${user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A'}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">Delete</button>
                        </td>
                    </tr>
                `;
                });
                document.getElementById('userTable').innerHTML = html;
            })
            .catch(error => console.error('Error loading users:', error));
    }

    function deleteUser(id) {
        if (confirm('Are you sure you want to delete this user? This will also delete their reservations and payments due to foreign key constraints (if cascaded).')) {
            fetch(`/DriveDock/api/admin/users?user_id=${id}`, {
                method: 'DELETE'
            })
                .then(res => {
                    if (res.ok) {
                        alert('User deleted successfully.');
                        loadUsers(); // Refresh the table
                    } else {
                        return res.text().then(text => {
                            throw new Error(text)
                        });
                    }
                })
                .catch(error => {
                    console.error('Delete failed:', error);
                    alert('Failed to delete user: ' + error.message);
                });
        }
    }

    loadUsers();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
