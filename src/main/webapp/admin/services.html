<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Services | DriveDock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">DriveDock Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="reservations.html">Reservations</a></li>
                <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
                <li class="nav-item"><a class="nav-link active" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="parking-management.html">Parking</a></li>
                <li class="nav-item"><a class="nav-link" href="payment-management.html">Payments</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-management.html">Admins</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><span class="nav-link" id="adminName"></span></li>
                <li class="nav-item">
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Service Management</h2>

    <!-- Form to Add/Edit Service -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            Add New Service
        </div>
        <div class="card-body">
            <form id="serviceForm">
                <input type="hidden" id="serviceId" name="id">
                <div class="mb-3">
                    <label for="name" class="form-label">Service Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label for="price" class="form-label">Price (LKR)</label>
                    <input type="number" step="0.01" class="form-control" id="price" name="price" required>
                </div>
                <button type="submit" class="btn btn-primary">Save Service</button>
                <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
            </form>
        </div>
    </div>

    <!-- Services List -->
    <h3>Existing Services</h3>
    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price (LKR)</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="servicesTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Display admin name
    const adminInfo = JSON.parse(localStorage.getItem('adminInfo') || '{}');
    if (adminInfo.fullName) {
        document.getElementById('adminName').textContent = `Welcome, ${adminInfo.fullName}`;
    }

    function loadServices() {
        fetch('/DriveDock/api/admin/services')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(service => {
                    html += `
                    <tr>
                        <td>${service.id}</td>
                        <td>${service.name}</td>
                        <td>${service.description || ''}</td>
                        <td>${service.price.toFixed(2)}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="editService(${service.id}, '${service.name}', '${service.description || ''}', ${service.price})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteService(${service.id})">Delete</button>
                        </td>
                    </tr>
                `;
                });
                document.getElementById('servicesTableBody').innerHTML = html;
            })
            .catch(error => console.error('Error loading services:', error));
    }

    function editService(id, name, description, price) {
        document.getElementById('serviceId').value = id;
        document.getElementById('name').value = name;
        document.getElementById('description').value = description;
        document.getElementById('price').value = price;
        document.querySelector('#serviceForm .card-header').innerText = 'Edit Service';
    }

    function resetForm() {
        document.getElementById('serviceId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('description').value = '';
        document.getElementById('price').value = '';
        document.querySelector('#serviceForm .card-header').innerText = 'Add New Service';
    }

    function deleteService(id) {
        if (confirm('Are you sure you want to delete this service? Related bookings might be affected.')) {
            fetch(`/DriveDock/api/admin/services?id=${id}`, {
                method: 'DELETE'
            })
                .then(res => {
                    if (res.ok) {
                        alert('Service deleted successfully.');
                        loadServices();
                        resetForm();
                    } else {
                        return res.json().then(err => {
                            throw new Error(err.error)
                        });
                    }
                })
                .catch(error => {
                    console.error('Delete failed:', error);
                    alert('Failed to delete service: ' + error.message);
                });
        }
    }

    // Handle form submission (add or edit)
    document.getElementById('serviceForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const formData = new URLSearchParams();
        formData.append('id', document.getElementById('serviceId').value);
        formData.append('name', document.getElementById('name').value);
        formData.append('description', document.getElementById('description').value);
        formData.append('price', document.getElementById('price').value);

        fetch('/DriveDock/api/admin/services', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        })
            .then(res => {
                if (res.ok) {
                    alert('Service saved successfully.');
                    loadServices();
                    resetForm();
                } else {
                    return res.json().then(err => {
                        throw new Error(err.error)
                    });
                }
            })
            .catch(error => {
                console.error('Error saving service:', error);
                alert('Failed to save service: ' + error.message);
            });
    });

    loadServices();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
