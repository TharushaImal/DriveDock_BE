<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | DriveDock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">DriveDock Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="reservations.html">Reservations</a></li>
                <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="parking-management.html">Parking</a></li>
                <li class="nav-item"><a class="nav-link" href="payment-management.html">Payments</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-management.html">Admins</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><span class="nav-link" id="adminName"></span></li>
                <li class="nav-item">
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Dashboard Overview</h2>

    <div class="row mt-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary mb-3">
                <div class="card-body">
                    <h5 class="card-title">Total Users</h5>
                    <h3 id="userCount">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-white bg-success mb-3">
                <div class="card-body">
                    <h5 class="card-title">Total Reservations</h5>
                    <h3 id="reservationCount">0</h3>
                </div>
            </div>
        </div>
        <!-- Add more stats cards here if needed -->
    </div>

    <div class="row mt-4">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    Daily Revenue (Last 7 Days)
                </div>
                <div class="card-body">
                    <canvas id="revenueChart" style="max-height: 400px;"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Check if user is logged in
    const sessionToken = localStorage.getItem('adminSessionToken');
    if (!sessionToken) {
        window.location.href = 'admin-login.html';
    }

    // Add session token to all fetch requests
    const originalFetch = window.fetch;
    window.fetch = function (...args) {
        // Add the session token header to all requests
        if (args[1]) {
            args[1].headers = {
                ...args[1].headers,
                'X-Session-Token': sessionToken
            };
        } else {
            args[1] = {
                headers: {
                    'X-Session-Token': sessionToken
                }
            };
        }
        return originalFetch.apply(this, args);
    };

    // Add logout functionality
    function logout() {
        fetch('/DriveDock/api/admin/logout', {
            method: 'POST',
            headers: {
                'X-Session-Token': sessionToken
            }
        }).finally(() => {
            localStorage.removeItem('adminSessionToken');
            localStorage.removeItem('adminInfo');
            window.location.href = 'admin-login.html';
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // Display admin name
    const adminInfo = JSON.parse(localStorage.getItem('adminInfo') || '{}');
    if (adminInfo.fullName) {
        document.getElementById('adminName').textContent = `Welcome, ${adminInfo.fullName}`;
    }

    // Fetch stats
    fetch('/DriveDock/api/admin/stats')
        .then(res => res.json())
        .then(data => {
            document.getElementById('userCount').innerText = data.users;
            document.getElementById('reservationCount').innerText = data.reservations;
        })
        .catch(error => console.error('Error fetching stats:', error));

    // Fetch revenue data
    fetch('/DriveDock/api/admin/revenue')
        .then(res => res.json())
        .then(data => {
            // Ensure data is an array, default to empty if not
            const labels = data.map(d => d.day || 'N/A');
            const values = data.map(d => d.total || 0);

            new Chart(document.getElementById('revenueChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Revenue (LKR)',
                        data: values,
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Amount (LKR)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        }
                    }
                }
            });
        })
        .catch(error => console.error('Error fetching revenue data:', error));
</script>
</body>
</html>
