<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reservations | DriveDock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">DriveDock Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="reservations.html">Reservations</a></li>
                <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="parking-management.html">Parking</a></li>
                <li class="nav-item"><a class="nav-link" href="payment-management.html">Payments</a></li>
                <li class="nav-item"><a class="nav-link" href="admin-management.html">Admins</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><span class="nav-link" id="adminName"></span></li>
                <li class="nav-item">
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Reservation Management</h2>
    <button class="btn btn-secondary mb-3" onclick="loadReservations()">Refresh List</button>
    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Slot</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="resTable"></tbody>
        </table>
    </div>
</div>

<script>
    // Display admin name
    const adminInfo = JSON.parse(localStorage.getItem('adminInfo') || '{}');
    if (adminInfo.fullName) {
        document.getElementById('adminName').textContent = `Welcome, ${adminInfo.fullName}`;
    }

    function loadReservations() {
        fetch('/DriveDock/api/admin/reservations')
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(r => {
                    html += `
                    <tr>
                        <td>${r.id}</td>
                        <td>${r.user || 'N/A'}</td>
                        <td>${r.slot || 'N/A'}</td>
                        <td>${r.start ? new Date(r.start).toLocaleString() : 'N/A'}</td>
                        <td>${r.end ? new Date(r.end).toLocaleString() : 'N/A'}</td>
                        <td><span class="badge bg-${r.status === 'CONFIRMED' ? 'success' : (r.status === 'CANCELLED' ? 'danger' : 'warning')}">${r.status}</span></td>
                        <td>
                            ${r.status !== 'CONFIRMED' ? `<button onclick="updateStatus(${r.id}, 'CONFIRMED')" class="btn btn-success btn-sm">Confirm</button>` : ''}
                            ${r.status !== 'CANCELLED' ? `<button onclick="updateStatus(${r.id}, 'CANCELLED')" class="btn btn-danger btn-sm">Cancel</button>` : ''}
                        </td>
                    </tr>
                `;
                });
                document.getElementById('resTable').innerHTML = html;
            })
            .catch(error => console.error('Error loading reservations:', error));
    }

    function updateStatus(id, status) {
        fetch('/DriveDock/api/admin/reservations', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `reservation_id=${id}&status=${status}`
        })
            .then(() => {
                alert(`Reservation ${id} updated to ${status}.`);
                loadReservations();
            })
            .catch(error => {
                console.error('Error updating status:', error);
                alert('Failed to update reservation status.');
            });
    }

    loadReservations();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
