<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | DriveDock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h3 {
            color: #333;
            font-weight: 600;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            width: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .alert {
            display: none;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <h3>DriveDock Admin Portal</h3>
        <p>Please login to access the dashboard</p>
    </div>

    <div id="alertMessage" class="alert alert-danger" role="alert">
        Invalid username or password
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label for="username" class="form-label">Username or Email</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-login">Login</button>
    </form>

    <div class="text-center mt-3">
        <small class="text-muted">© 2026 DriveDock. All rights reserved.</small>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);

        try {
            const response = await fetch('/DriveDock/api/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            });

            const data = await response.json();

            if (response.ok && data.success) {
                // Store session token in localStorage
                localStorage.setItem('adminSessionToken', data.sessionToken);
                localStorage.setItem('adminInfo', JSON.stringify(data.admin));

                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Show error message
                const alertDiv = document.getElementById('alertMessage');
                alertDiv.textContent = data.error || 'Login failed';
                alertDiv.style.display = 'block';

                // Hide alert after 3 seconds
                setTimeout(() => {
                    alertDiv.style.display = 'none';
                }, 3000);
            }
        } catch (error) {
            console.error('Login error:', error);
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = 'Network error. Please try again.';
            alertDiv.style.display = 'block';

            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }
    });
</script>
</body>
</html>
